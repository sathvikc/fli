name: Upload Python Package

# Triggers:
# - release: published    -> auto-publish when a GH Release is created manually
#                            (e.g. via the manual fallback in docs/guides/release.md)
# - workflow_dispatch     -> manual publish, used for TestPyPI smoke tests or
#                            recovery (e.g. shipping a tag that release.yml failed
#                            to publish). Pick the tag/branch in the dispatch UI.
#
# This workflow is NOT called from release.yml -- release.yml inlines its own
# publish steps. See docs/guides/release.md for the rationale (PyPI Trusted
# Publishing attestations are incompatible with reusable workflow chains).

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to publish to'
        required: true
        default: 'testpypi'
        type: choice
        options:
        - testpypi
        - pypi

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    # Skip when a release for the JS package (tag fli-js-v*) fires this
    # workflow — that's publish-npm.yml's job.
    if: ${{ github.event_name != 'release' || !startsWith(github.event.release.tag_name, 'fli-js-v') }}
    uses: ./.github/workflows/ci.yml

  release-build:
    needs: [ test ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build release distributions
        run: uv build

      - name: Check package
        run: uv run twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    # Only auto-publish on release events created by humans (manual fallback).
    # release.yml publishes inline and creates its tag/Release via the bot, so
    # excluding github-actions[bot] prevents a second, racing publish that would
    # 400 with "File already exists". JS-package releases (tag fli-js-v*) are
    # handled by publish-npm.yml and must be skipped here. workflow_dispatch
    # publishes only when the operator explicitly selects the pypi environment.
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'pypi') || (github.event_name == 'release' && github.actor != 'github-actions[bot]' && !startsWith(github.event.release.tag_name, 'fli-js-v')) }}
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/flights

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
