name: Actionlint

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflow files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          # Show inline annotations on the PR diff for any findings
          matcher: true
